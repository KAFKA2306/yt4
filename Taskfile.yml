version: '3'

tasks:
  default:
    cmds:
      - task --list

  run:
    desc: Execute the autonomous resonance production loop
    cmds:
      - bun index.ts

  validate:audio:
    desc: Perform standalone ASR validation
    cmds:
      - bun src/validation/cli.ts

  lint:
    desc: Ensure zero-fat and code quality standards
    cmds:
      - bun x biome check --write src/
      - npx tsc --noEmit

  clean:
    desc: Purge all local artifacts
    cmds:
      - rm -rf transcripts/* runs/* NUMBERS.md

  numbers:
    desc: View management report
    cmds:
      - cat NUMBERS.md
