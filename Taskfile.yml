version: '3'

tasks:
  default:
    cmds:
      - task --list

  run:
    desc: Execute the autonomous resonance production loop
    cmds:
      - bun index.ts

  validate:audio:
    desc: Perform standalone ASR validation
    cmds:
      - bun src/validation/cli.ts

  lint:
    desc: Ensure zero-fat and code quality standards
    cmds:
      - bun x biome check --write src/
      - npx tsc --noEmit

  clean:
    desc: Purge all local artifacts
    cmds:
      - rm -rf transcripts/* NUMBERS.md

  numbers:
    desc: View management report
    cmds:
      - cat NUMBERS.md

  git:atomic:
    desc: Commit each modified/untracked file individually
    cmds:
      - |
        for file in $(git status --porcelain | sed 's/^...//'); do
          git add "$file"
          git commit -m "refactor: update $file"
        done

  asmr:expand:
    desc: Expand script_master.md to 5000+ characters using Existence Fetish style
    cmds:
      - echo "Expansion protocol triggered. Agent intervention required or use autonomous-expander.ts"
